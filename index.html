<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora</title>
</head>
<body>
    <h1>Calculadora super legal ó</h1>

    <div class="conteiner">
        <div class="visor">0</div>
    
        <div class="botoes">
            <div class="linha1">
                <div class="bAC">AC</div>
                <div class="bmaismenos">+/-</div>
                <div class="bporcentagem">%</div>
                <div class="bdivisao">/</div>
            </div>

            <div class="linha2">
                <div class="b7">7</div>
                <div class="b8">8</div>
                <div class="b9">9</div>
                <div class="bx">x</div>
            </div>

            <div class="linha3">
                <div class="b4">4</div>
                <div class="b5">5</div>
                <div class="b6">6</div>
                <div class="bmenos">-</div>
            </div>

            <div class="linha4">
                <div class="b1">1</div>
                <div class="b2">2</div>
                <div class="b3">3</div>
                <div class="bmais">+</div>
            </div>

            <div class="linha5">
                <div class="b0">0</div>
                <div class="bponto">.</div>
                <div class="bigual">=</div>
            </div>
        </div>
    </div>

    <p>&copy; Criado por: Aline Medeiros</p>
</body>
</html>
